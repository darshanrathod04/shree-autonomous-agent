spring.application.name=ai-agent
spring.security.enabled=false

server.port=8080
server.tomcat.connection-timeout=10000
server.tomcat.keep-alive-timeout=15000

# ============================================
# SHREE SYSTEM CONFIGURATION
# ============================================

# Autonomous Scheduler
# Set to false to disable autonomous background processing.
# In USER-ONLY MODE, Shree only responds to user requests.
shree.scheduler.enabled=false